# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: true
  tools:
    github-checks:
      timeout_ms: 900000
  path_instructions:
    - path: "**"
      instructions: |
        Check that any user-facing change includes a corresponding entry in
        CHANGELOG.md under the [Unreleased] section. Entries should use
        imperative present tense ("Add X", not "Added X") and be placed under
        the correct category (Added, Changed, Deprecated, Removed, or Fixed).
        Entries may appear at any position within their category — do not flag
        placement order. For Deprecated, Changed, and Removed entries, verify
        the entry includes migration guidance telling users what replaces the
        old behavior.
    - path: "**/*.py"
      instructions: |
        Flag inline code comments (not docstrings) that are verbose or
        redundant: comments that restate what the code already shows, repeat
        the same point in multiple places, or narrate obvious steps. Comments
        should be brief and reserved for non-obvious code, explaining why
        rather than what.
chat:
  auto_reply: true
issue_enrichment:
  auto_enrich:
    enabled: false
