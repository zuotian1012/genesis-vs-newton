name: Minimum Dependency Version Tests on AWS EC2 (Reusable)

# Standalone workflow that tests Newton with the lowest compatible versions
# of direct PyPI dependencies (as specified by version floors in pyproject.toml).
# Dispatched by scheduled_nightly.yml via the workflow_dispatch API.

env:
  AWS_REGION: us-east-2
  # Prefer the validated US capacity order before Asia-Pacific fallback.
  AWS_REGION_CANDIDATES: us-east-1 us-east-2 us-west-2 ap-northeast-1 ap-northeast-2
  AWS_INSTANCE_TYPE: g7e.2xlarge
  AWS_VOLUME_SIZE: 92
  AWS_VOLUME_TYPE: gp3
  AWS_ROLE_ARN: arn:aws:iam::968945269301:role/newton-physics-newton-ec2-github-runner-role
  AWS_ROLE_DURATION: 3600
  AWS_RUNNER_RESOURCE_TAG: newton-github-runner

on:
  workflow_call:
    secrets:
      GH_PERSONAL_ACCESS_TOKEN:
        required: true
      CODECOV_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  start-runner:
    name: Start self-hosted EC2 runner
    if: github.repository == 'newton-physics/newton'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
      region: ${{ steps.start-ec2-runner.outputs.region }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-duration-seconds: ${{ env.AWS_ROLE_DURATION }}

      - name: Discover AWS runner networking
        id: discover-runner-config
        run: python scripts/ci/discover_aws_runner_config.py

      - name: Start EC2 runner
        id: start-ec2-runner
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef  # v2.6.1
        with:
          mode: start
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-instance-type: ${{ env.AWS_INSTANCE_TYPE }}
          ec2-volume-size: ${{ env.AWS_VOLUME_SIZE }}
          ec2-volume-type: ${{ env.AWS_VOLUME_TYPE }}
          availability-zones-config: ${{ steps.discover-runner-config.outputs.availability-zones-config }}
          pre-runner-script: |
            if [ -d /opt/dlami/nvme ]; then
              mkdir -p /opt/dlami/nvme/actions-runner/_work
              mkdir -p /opt/dlami/nvme/actions-runner/.local
              mkdir -p /opt/dlami/nvme/actions-runner/.cache
              ln -s /opt/dlami/nvme/actions-runner/_work /actions-runner/_work
              ln -s /opt/dlami/nvme/actions-runner/.local /actions-runner/.local
              ln -s /opt/dlami/nvme/actions-runner/.cache /actions-runner/.cache
            fi
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "ec2-github-runner"},
              {"Key": "created-by", "Value": "github-actions-newton-role"},
              {"Key": "GitHub-Repository", "Value": "${{ github.repository }}"}
            ]

  minimum-deps-tests:
    name: Run Tests with Minimum Dependency Versions
    needs: start-runner
    if: ${{ !cancelled() && needs.start-runner.result == 'success' }}
    runs-on: ${{ needs.start-runner.outputs.label }}
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      HOME: /actions-runner
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.26"

      - name: Set up Python
        run: uv python install

      - name: Resolve and install minimum dependency versions
        run: |
          uv sync --extra dev --resolution lowest-direct
          echo "Resolved dependency versions:"
          uv tree --depth 1 --frozen

      # `--no-sync` is load-bearing: without it `uv run` re-resolves to `highest` and the floors above stop applying.
      - name: Run Tests
        env:
          PYTHONFAULTHANDLER: "1"
        run: uv run --no-sync -m newton.tests --strict-warnings --junit-report-xml rspec.xml

      - name: Test Summary
        if: ${{ !cancelled() }}
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5  # v2.6
        with:
          paths: "rspec.xml"
          show: "fail"

      - name: Upload test results artifact
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-results-min-deps
          path: rspec.xml
          retention-days: 1
          overwrite: true

      - name: Re-run instructions
        if: failure()
        run: |
          echo "::error::DO NOT use 'Re-run failed jobs' - the EC2 runner no longer exists and your job will be queued forever."
          echo "::error::USE 'Re-run all jobs' instead to start a fresh EC2 runner."
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## ⚠️ How to Re-run This Workflow

          This workflow uses **ephemeral EC2 runners** that are terminated after each run.

          | | Option | Result |
          |---|--------|--------|
          | ❌ | **Re-run failed jobs** | Runner no longer exists → job queued forever |
          | ✅ | **Re-run all jobs** | Starts new EC2 runner → tests re-run |
          EOF

  codecov-upload:
    name: Upload test results to Codecov
    needs: minimum-deps-tests
    if: ${{ !cancelled() && needs.minimum-deps-tests.result != 'skipped' }}
    runs-on: ubuntu-latest
    # Same-run artifact downloads use the runtime token, not GITHUB_TOKEN.
    permissions: {}
    steps:
      # *.blob.core.windows.net is intentionally broad: GitHub artifact storage
      # uses rotating productionresultssaN hosts and harden-runner only supports
      # leading full-label wildcards.
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            cli.codecov.io:443
            ingest.codecov.io:443
            keybase.io:443
            o26192.ingest.us.sentry.io:443
            results-receiver.actions.githubusercontent.com:443
            storage.googleapis.com:443
      - name: Download test results artifact
        id: download-test-results
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: test-results-min-deps
      - name: Upload test results to Codecov
        if: ${{ steps.download-test-results.outcome == 'success' }}
        continue-on-error: true
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5.5.3
        with:
          disable_search: true
          files: ./rspec.xml
          flags: minimum-deps-nightly
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

  stop-runner:
    name: Stop self-hosted EC2 runner
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs:
      - start-runner
      - minimum-deps-tests
    if: always() && needs.start-runner.result != 'skipped' && github.repository == 'newton-physics/newton'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Validate launch region
        if: ${{ needs.start-runner.outputs.ec2-instance-id != '' && needs.start-runner.outputs.region == '' }}
        run: |
          echo "::error::EC2 instance ID exists but the launch region output is empty."
          exit 1

      - name: Configure AWS credentials
        if: ${{ needs.start-runner.outputs.ec2-instance-id != '' }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          aws-region: ${{ needs.start-runner.outputs.region }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-duration-seconds: ${{ env.AWS_ROLE_DURATION }}

      - name: Stop EC2 runner
        if: ${{ needs.start-runner.outputs.ec2-instance-id != '' }}
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef  # v2.6.1
        with:
          mode: stop
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}
