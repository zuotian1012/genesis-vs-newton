name: Pull Request
permissions:
  contents: read

on:
  merge_group:
  pull_request:
    branches:
      - main
      - "release-*"

concurrency:
  group: ${{ github.workflow }}-on-${{ github.event_name }}-from-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  check-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            download.pytorch.org:443
            files.pythonhosted.org:443
            github.com:443
            pypi.nvidia.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.26"
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Check uv lockfile
        run: uv lock --check

  run-newton-tests:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  pull-request-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.26"
      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Install pandoc
        uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e  # v1.1.1
      - name: Build Sphinx documentation
        run: uv run --extra docs --extra sim sphinx-build -j auto -W -b html docs docs/_build/html
        env:
          NEWTON_REQUIRE_PANDOC: "1"
      - name: Verify API docs are up-to-date
        run: |
          git diff --exit-code docs/api/ || {
            echo "::error::API docs are stale. Run 'python docs/generate_api.py' and commit the changes."
            exit 1
          }
      - name: Run Sphinx doctests
        run: uv run --extra docs --extra sim sphinx-build -j auto -W -b doctest docs docs/_build/doctest
